set -g mouse on

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Change prefix from Ctrl-b to Ctrl-w
unbind C-b
set -g prefix C-w
bind C-w send-prefix

#set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"

set -g terminal-features "*:RGB"
set -g default-command "bash -i"

# Inactive pane/window border: light grey
set -g pane-border-style "fg=colour250"

# Active pane/window border: bright green
set -g pane-active-border-style "fg=brightgreen"
# make tmux try to talk to system clipboard too (helpful, but not sufficient alone)
set -g set-clipboard on

# when you release mouse after selecting, copy to system clipboard (X11 / xclip)
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Active pane: normal
set -g window-active-style "fg=default,bg=black"

# Inactive panes: slightly dim / grey
set -g window-style "fg=default,bg=default"


set -g window-status-style "bg=default,fg=default"
set -g window-status-current-style "bg=blue,fg=white"

# Switch windows: j = previous, k = next
bind-key [ previous-window
bind-key ] next-window



# Reduce ESC delay (default is often ~500ms)
# to stop the esc lag in neovim
set -s escape-time 0


# new window starts in the current pane's dir
bind c new-window -c "#{pane_current_path}"

run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux

# supposedly stops window nav issue
set -g repeat-time 0
